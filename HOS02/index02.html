<!DOCTYPE html>
<head>
    <title>HTML Links</title>
</head>
<body>
    <h2>An Unordered HTML List</h2>
    <ul>
        <li>Coffee</li>
        <li>Tea</li>
        <li>Milk</li>   
    </ul>
    <ul style="list-style: square;">
        <li>Coffee</li>
        <li>Tea</li>
        <li>Milk</li>
    </ul>
    <h2>An Ordered HTML List</h2>
    <ol>
        <li>Coffee</li>
        <li>Tea</li>
        <li>Milk</li>
    </ol>
    <h2>Team 00 - Demo Team</h2>
    <ol type="A">
        <li><a href="https://c4cyi.cityu.edu/center/" target="_blank">
            STC Center
        </a></li>
    </ol>
</body>
